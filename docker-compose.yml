services:
  postgres:
    image: postgres:17
    container_name: meteo-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meteo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: meteo-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: meteo-frontend
    depends_on:
      - backend
    env_file:
      - ./.env
    ports:
      - "3000:3000"
  
  prometheus:
    image: prom/prometheus:latest
    container_name: meteo-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: meteo-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus-data:
  grafana-data: