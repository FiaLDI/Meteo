version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: meteo-postgres
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meteo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: meteo-backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: meteo-frontend
    depends_on:
      - backend
    env_file:
      - ./.env
    ports:
      - "3000:3000"

volumes:
  postgres_data: