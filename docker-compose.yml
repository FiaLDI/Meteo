version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: meteo-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: meteo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meteo"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend

    container_name: meteo-backend

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      PORT: 8000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/meteo?schema=public

    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend

    container_name: meteo-frontend

    depends_on:
      - backend

    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

    ports:
      - "3000:3000"

volumes:
  postgres_data: